<div class="dashboard-container">
  <mat-toolbar color="primary">
    <span>Auth App Dashboard</span>
    <span class="spacer"></span>
    <button mat-button (click)="logout()">
      <mat-icon>exit_to_app</mat-icon>
      Logout
    </button>
  </mat-toolbar>

  <div class="content">
    <div *ngIf="isLoading" class="loading-container">
      <mat-spinner></mat-spinner>
    </div>

    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>

    <mat-card *ngIf="user && !isLoading" class="user-card">
      <mat-card-header>
        <div mat-card-avatar class="user-avatar">
          <mat-icon>person</mat-icon>
        </div>
        <mat-card-title>Welcome, {{ user.name }}!</mat-card-title>
        <mat-card-subtitle>User Profile</mat-card-subtitle>
      </mat-card-header>
      
      <mat-card-content>
        <div class="user-details">
          <div class="detail-item">
            <strong>Email:</strong> {{ user.email }}
          </div>
          <div class="detail-item">
            <strong>Gender:</strong> {{ user.gender }}
          </div>
          <div class="detail-item">
            <strong>Member Since:</strong> {{ user.createdAt | date:'mediumDate' }}
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
